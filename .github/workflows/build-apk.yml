name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create minimal dist (app loads live URL)
        run: |
          mkdir -p dist
          echo '<html><body>Redirecting...</body></html>' > dist/index.html

      - name: Sync Capacitor
        run: |
          npx cap add android || npx cap sync android

      - name: Set App Icon
        run: |
          # Resize official logo for each density folder to reduce APK size
          # mdpi: 48, hdpi: 72, xhdpi: 96, xxhdpi: 144, xxxhdpi: 192
          convert src/assets/logo.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert src/assets/logo.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert src/assets/logo.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          
          convert src/assets/logo.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert src/assets/logo.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert src/assets/logo.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          
          convert src/assets/logo.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert src/assets/logo.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert src/assets/logo.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          
          convert src/assets/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert src/assets/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert src/assets/logo.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          
          convert src/assets/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert src/assets/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          convert src/assets/logo.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest Release
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
